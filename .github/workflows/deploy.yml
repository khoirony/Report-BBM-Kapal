name: Deploy to Contabo

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/bbm-kapal
            git pull origin main
            
            # Setup .env
            echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" > .env
            echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
            echo "APP_NAME=BBM-Kapal" >> .env
            echo "APP_ENV=production" >> .env
            echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env
            echo "APP_DEBUG=false" >> .env
            echo "APP_URL=https://bbmkapal-dishubjakarta.com" >> .env
            echo "DB_CONNECTION=mysql" >> .env
            echo "DB_HOST=db" >> .env
            echo "DB_PORT=3306" >> .env
            echo "DB_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
            echo "DB_USERNAME=root" >> .env
            echo "DB_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env

            # Setup Email (Brevo SMTP)
            echo "MAIL_MAILER=smtp" >> .env
            echo "MAIL_HOST=smtp-relay.brevo.com" >> .env
            echo "MAIL_PORT=587" >> .env
            echo "MAIL_USERNAME=a7795d001@smtp-brevo.com" >> .env
            echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> .env
            echo "MAIL_ENCRYPTION=tls" >> .env
            
            # Email pengirim yang akan terlihat oleh user
            echo "MAIL_FROM_ADDRESS=noreply@bbmkapal-dishubjakarta.com" >> .env 
            echo "MAIL_FROM_NAME=\"\${APP_NAME}\"" >> .env
            
            docker-compose up -d --build
            docker image prune -f