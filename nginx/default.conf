server {
    listen 80;
    server_name dishub.khoirony.fun;

    # Wajib ada agar auto-renewal sertifikat lancar di masa depan
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect otomatis semua HTTP ke HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name dishub.khoirony.fun;

    # Jalur Sertifikat SSL yang baru saja Anda buat
    ssl_certificate /etc/letsencrypt/live/dishub.khoirony.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dishub.khoirony.fun/privkey.pem;

    # Optimasi SSL (Opsional tapi bagus)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/html/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}