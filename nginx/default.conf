server {
    listen 80;
    server_name bbmkapal-dishubjakarta.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect semua traffic HTTP ke HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name bbmkapal-dishubjakarta.com;

    # LIMIT UPLOAD DINAINKAN JADI 50MB
    client_max_body_size 50M;

    # Sertifikat SSL dari OS Server Host
    ssl_certificate /etc/letsencrypt/live/bbmkapal-dishubjakarta.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bbmkapal-dishubjakarta.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/html/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}